<!DOCTYPE html>
<html lang="pt-PT" dir="ltr">
<head>
  <meta charset="UTF-8" />

  <!-- ─── Viewport & Color ─────────────────────────────────────── -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#00ff88" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#00ff88" />
  <meta name="color-scheme" content="dark" />

  <!-- ─── SEO & Description ────────────────────────────────────── -->
  <meta name="description"
    content="Elite Sleep — Monitor de sono e prontidão para atletas de futebol profissional. Readiness Score, protocolo noturno, sestas e análise do sistema nervoso." />
  <meta name="keywords" content="sono, atleta, futebol, recovery, readiness, pwa, sleep tracker" />
  <meta name="author" content="Elite Sleep" />

  <!-- ─── PWA Manifest ─────────────────────────────────────────── -->
  <!-- CORRIGIDO: caminho absoluto em vez de relativo para evitar erro no GitHub Pages -->
  <link rel="manifest" href="/Sono-monitor/manifest.json" />

  <!-- ─── iOS / Safari ─────────────────────────────────────────── -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Elite Sleep" />
  <meta name="format-detection" content="telephone=no" />

  <link rel="apple-touch-icon" href="/Sono-monitor/icons/icon-180x180.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="/Sono-monitor/icons/icon-128x128.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/Sono-monitor/icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="/Sono-monitor/icons/icon-180x180.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/Sono-monitor/icons/icon-180x180.png" />

  <!-- iOS Splash Screens (portrait) -->
  <link rel="apple-touch-startup-image"
    href="/Sono-monitor/icons/icon-512x512.png"
    media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
  <link rel="apple-touch-startup-image"
    href="/Sono-monitor/icons/icon-192x192.png"
    media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />

  <!-- ─── Android / Chrome ──────────────────────────────────────── -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Elite Sleep" />

  <!-- ─── Open Graph ───────────────────────────────────────────── -->
  <meta property="og:title"       content="Elite Sleep — Atleta Pro Monitor" />
  <meta property="og:description" content="Monitor de sono e prontidão para atletas de elite." />
  <meta property="og:type"        content="website" />
  <meta property="og:image"       content="/Sono-monitor/icons/icon-512x512.png" />

  <!-- ─── Twitter Card ─────────────────────────────────────────── -->
  <meta name="twitter:card"        content="summary" />
  <meta name="twitter:title"       content="Elite Sleep" />
  <meta name="twitter:description" content="Monitor de sono para atletas de elite." />

  <!-- ─── Favicon ──────────────────────────────────────────────── -->
  <link rel="icon" type="image/png" sizes="32x32" href="/Sono-monitor/icons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/Sono-monitor/icons/favicon-16x16.png" />
  <link rel="shortcut icon"         href="/Sono-monitor/icons/favicon-32x32.png" />

  <!-- ─── Fonts (preloaded) ────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;600;700&display=swap"
    rel="stylesheet"
  />

  <title>Elite Sleep — Atleta Pro</title>

  <!-- ─── Critical CSS (prevent FOUC / layout shift) ───────────── -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #06060b;
      height: 100%;
      overscroll-behavior: none;
    }

    #root {
      height: 100%;
      contain: layout;
    }

    * { -webkit-tap-highlight-color: transparent; }

    ::-webkit-scrollbar { width: 0; height: 0; }

    @font-face {
      font-family: 'Bebas Neue';
      font-display: swap;
    }
    @font-face {
      font-family: 'Space Mono';
      font-display: swap;
    }
    @font-face {
      font-family: 'DM Sans';
      font-display: swap;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./src/main.jsx"></script>

  <!-- ─── Service Worker Registration ──────────────────────────── -->
  <!-- ADICIONADO: registo do SW diretamente no HTML como fallback seguro -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('/Sono-monitor/sw.js', { scope: '/Sono-monitor/' })
          .then(reg => console.log('[SW] Registado com scope:', reg.scope))
          .catch(err => console.error('[SW] Erro no registo:', err));
      });
    }
  </script>
</body>
</html>
